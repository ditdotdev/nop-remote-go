#
# Build and test on pull request - updated to force recognition by GitHub Actions
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials
        shell: bash
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*
          go env -w GOPROXY=direct
        shell: bash
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
      - name: Build
        run: go build -v ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0
      - name: Build Command
        run: go build -o build/nop ./cmd/nop
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0
      - name: Test
        run: go test -v ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
          GONOPROXY: github.com/datadatdat/*
          GONOSUMDB: github.com/datadatdat/*
          GIT_TERMINAL_PROMPT: 0
