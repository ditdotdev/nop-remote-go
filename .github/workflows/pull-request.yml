#
# Build and test on pull request - updated to force recognition
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build
        run: go build -v ./...
      - name: Build Command
        run: go build -o build/nop ./cmd/nop
      - name: Test
        run: go test -v ./...
